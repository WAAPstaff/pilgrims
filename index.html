let W=0,H=0,DPR=1;
let MX=0,MY=0,MW=0,MH=0; /* 地図の描画領域(縦横比固定・中央配置) */
const LAT_TOP=76, LAT_BOT=-58;
const MAP_AR=360/(LAT_TOP-LAT_BOT); /* ≒2.69 */
function proj(lon,lat){
  return [MX+((lon+180)/360)*MW, MY+((LAT_TOP-lat)/(LAT_TOP-LAT_BOT))*MH];
}
function wrapX(x){
  let r=(x-MX)%MW; if(r<0)r+=MW; return MX+r;
}

/* ---------- 陸ドットグリッド ---------- */
function inPoly(lon,lat,poly){
  let inside=false;
  for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if(((yi>lat)!==(yj>lat)) && (lon < (xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=true;
  }
  return inside;
}
let landDots=[];
function buildDots(){
  landDots=[];
  const gap = Math.max(3.5, MW/260);
  for(let x=MX+gap/2;x<MX+MW;x+=gap){
    for(let y=MY+gap/2;y<MY+MH;y+=gap){
      const lon=((x-MX)/MW)*360-180, lat=LAT_TOP-((y-MY)/MH)*(LAT_TOP-LAT_BOT);
      for(let p=0;p<LAND.length;p++){
        if(inPoly(lon,lat,LAND[p])){ landDots.push({x,y,ph:Math.random()*6.28}); break; }
      }
    }
  }
}

    case 'FR': R(0,0,w/3,h,'#0055a4'); R(w/3,0,w/3,h,'#fff'); R(w*2/3,0,w/3,h,'#ef4135'); break;
    case 'DE': R(0,0,w,h/3,'#000'); R(0,h/3,w,h/3,'#dd0000'); R(0,h*2/3,w,h/3,'#ffce00'); break;
    /* 東南アジア・南アジア */
    case 'MY': R(0,0,w,h,'#cc0001');
      for(let i=1;i<14;i+=2) R(0,i*h/14,w,h/14,'#fff');
      R(0,0,w*.5,h*7/14,'#010066');
      g.fillStyle='#ffcc00'; g.beginPath(); g.arc(w*.22,h*.25,h*.11,0,7); g.fill();
      g.fillStyle='#010066'; g.beginPath(); g.arc(w*.26,h*.25,h*.09,0,7); g.fill();
      g.fillStyle='#ffcc00'; star(g,w*.34,h*.25,h*.07); break;
    case 'ID': R(0,0,w,h/2,'#ce1126'); R(0,h/2,w,h/2,'#fff'); break;
    case 'PH': R(0,0,w,h/2,'#0038a8'); R(0,h/2,w,h/2,'#ce1126');
      g.fillStyle='#fff'; g.beginPath(); g.moveTo(0,0); g.lineTo(w*.4,h/2); g.lineTo(0,h); g.closePath(); g.fill();
      g.fillStyle='#fcd116'; star(g,w*.10,h*.5,h*.09); break;
    case 'VN': R(0,0,w,h,'#da251d'); g.fillStyle='#ff0'; star(g,w/2,h/2,h*.28); break;
    case 'IN': R(0,0,w,h/3,'#ff9933'); R(0,h/3,w,h/3,'#fff'); R(0,h*2/3,w,h/3,'#138808');
      g.strokeStyle='#000080'; g.lineWidth=1.5; g.beginPath(); g.arc(w/2,h/2,h*.13,0,7); g.stroke(); break;
    /* オセアニア・北米 */
    case 'NZ': R(0,0,w,h,'#00247d'); R(0,0,w/2,h/2,'#00247d'); uj(g,0,0,w/2,h/2);
      g.fillStyle='#cc142b'; star(g,w*.75,h*.28,h*.06); star(g,w*.83,h*.5,h*.07); star(g,w*.7,h*.6,h*.05); star(g,w*.8,h*.75,h*.06); break;
    case 'CA': R(0,0,w/4,h,'#d80621'); R(w*3/4,0,w/4,h,'#d80621'); R(w/4,0,w/2,h,'#fff');
      g.fillStyle='#d80621'; g.font=`${h*.6}px serif`; g.textAlign='center'; g.textBaseline='middle'; g.fillText('\u{1F341}',w/2,h*.52); break;
    /* ヨーロッパ */
    case 'IT': R(0,0,w/3,h,'#009246'); R(w/3,0,w/3,h,'#fff'); R(w*2/3,0,w/3,h,'#ce2b37'); break;
    case 'ES': R(0,0,w,h,'#c60b1e'); R(0,h/4,w,h/2,'#ffc400'); break;
    case 'NL': R(0,0,w,h/3,'#21468b'); R(0,h/3,w,h/3,'#fff'); R(0,h*2/3,w,h/3,'#ae1c28');
      /* NLは上赤下青が正だが視認優先で簡略 */
      R(0,0,w,h/3,'#ae1c28'); R(0,h*2/3,w,h/3,'#21468b'); break;
    case 'IE': R(0,0,w/3,h,'#169b62'); R(w/3,0,w/3,h,'#fff'); R(w*2/3,0,w/3,h,'#ff883e'); break;
    case 'PT': R(0,0,w*.4,h,'#006600'); R(w*.4,0,w*.6,h,'#ff0000');
      g.fillStyle='#ffff00'; g.beginPath(); g.arc(w*.4,h/2,h*.16,0,7); g.stroke(); break;
    case 'BE': R(0,0,w/3,h,'#000'); R(w/3,0,w/3,h,'#fdda24'); R(w*2/3,0,w/3,h,'#ef3340'); break;
    case 'CH': R(0,0,w,h,'#d52b1e');
      g.fillStyle='#fff'; R(w*.42,h*.22,w*.16,h*.56,'#fff'); R(w*.28,h*.42,w*.44,h*.16,'#fff'); break;
    case 'AT': R(0,0,w,h/3,'#ed2939'); R(0,h/3,w,h/3,'#fff'); R(0,h*2/3,w,h/3,'#ed2939'); break;
    case 'SE': R(0,0,w,h,'#006aa7'); R(w*.28,0,w*.14,h,'#fecc00'); R(0,h*.42,w,h*.16,'#fecc00'); break;
    case 'NO': R(0,0,w,h,'#ba0c2f'); R(w*.28,0,w*.14,h,'#fff'); R(0,h*.42,w,h*.16,'#fff');
      R(w*.31,0,w*.08,h,'#00205b'); R(0,h*.46,w,h*.08,'#00205b'); break;
    case 'DK': R(0,0,w,h,'#c8102e'); R(w*.28,0,w*.12,h,'#fff'); R(0,h*.44,w,h*.12,'#fff'); break;
    case 'FI': R(0,0,w,h,'#fff'); R(w*.28,0,w*.12,h,'#003580'); R(0,h*.44,w,h*.12,'#003580'); break;
    case 'PL': R(0,0,w,h/2,'#fff'); R(0,h/2,w,h/2,'#dc143c'); break;
    case 'CZ': R(0,0,w,h/2,'#fff'); R(0,h/2,w,h/2,'#d7141a');
      g.fillStyle='#11457e'; g.beginPath(); g.moveTo(0,0); g.lineTo(w*.5,h/2); g.lineTo(0,h); g.closePath(); g.fill(); break;
    default: R(0,0,w,h,'#888');
  }
  g.strokeStyle='rgba(0,0,0,.35)'; g.lineWidth=2; g.strokeRect(1,1,w-2,h-2);
  return c;
}
function star(g,x,y,r){
  g.beginPath();
  for(let i=0;i<5;i++){
    const a=-Math.PI/2+i*6.28/5, b=a+6.28/10;
    g.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
    g.lineTo(x+Math.cos(b)*r*.42,y+Math.sin(b)*r*.42);
  }
  g.closePath(); g.fill();
}
function uj(g,x,y,w,h){ /* union jack simplified */
  g.strokeStyle='#fff'; g.lineWidth=h*.22;
  g.beginPath(); g.moveTo(x,y); g.lineTo(x+w,y+h); g.moveTo(x+w,y); g.lineTo(x,y+h); g.stroke();
  g.strokeStyle='#c8102e'; g.lineWidth=h*.09;
  g.beginPath(); g.moveTo(x,y); g.lineTo(x+w,y+h); g.moveTo(x+w,y); g.lineTo(x,y+h); g.stroke();
  g.strokeStyle='#fff'; g.lineWidth=h*.3;
  g.beginPath(); g.moveTo(x+w/2,y); g.lineTo(x+w/2,y+h); g.moveTo(x,y+h/2); g.lineTo(x+w,y+h/2); g.stroke();
  g.strokeStyle='#c8102e'; g.lineWidth=h*.16;
  g.beginPath(); g.moveTo(x+w/2,y); g.lineTo(x+w/2,y+h); g.moveTo(x,y+h/2); g.lineTo(x+w,y+h/2); g.stroke();
}

/* なびく旗の描画(縦スライスをsinでずらす) */
function drawWavyFlag(img,x,y,fw,fh,t){
  const slices=12, sw=img.width/slices;
  for(let i=0;i<slices;i++){
    const k=i/slices;
    const dy = reduceMotion ? 0 : Math.sin(t*2.4 + k*4)*fh*.09*k;
    ctx.drawImage(img, i*sw,0,sw,img.height, x+k*fw, y+dy, fw/slices+.6, fh);
  }
}

/* ---------- 状態 ---------- */

function fmtCount(n){ return 'PILGRIMS\u00A0'+String(n).padStart(4,'0'); }
function addPilgrim(cityIdx, kind){
  const c=CITIES[cityIdx];
  addPilgrimAt(c[1],c[2],kind||'guest',c[0],c[4]);
}
function addPilgrimAt(lon,lat,kind,origin,cc){
  const [px,py]=proj(lon,lat);
  pilgrims.push({x:wrapX(px+(Math.random()-.5)*8), y:py+(Math.random()-.5)*8, born:performance.now(), kind});
  if(!counts[origin]) counts[origin]={cc:cc||'XX',lon,lat,n:0};
  counts[origin].n++;
  total++;
  countEl.textContent=fmtCount(total);
}
function unwrapDest(lon0){
  let d=ISHIGAKI.lon;
  while(d-lon0>180)d-=360;
  while(d-lon0<-180)d+=360;
  return d;
}
function spawnFlightAt(lon,lat,kind,label,no,cc){
  const lon0=lon+(Math.random()-.5)*.8, lat0=lat+(Math.random()-.5)*.8;
  const dist=Math.hypot(unwrapDest(lon0)-lon0, ISHIGAKI.lat-lat0);
  flights.push({label,cc:cc||'XX',kind,no,olon:lon,olat:lat,
    lon0,lat0,lonU:unwrapDest(lon0),tStart:performance.now(),
    dur:2600+dist*45, lift:Math.min(20,3+dist*.16)});
}
function spawnFlight(){ /* 疑似データ用 */
  const idx=cityBag[Math.floor(Math.random()*cityBag.length)];
  const c=CITIES[idx];
  spawnFlightAt(c[1],c[2], Math.random()<.22?'visitor':'guest',
                c[0], total+flights.length+1, c[4]);
}

/* ---------- 描画 ---------- */
const easeIO=t=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

function drawIshigaki(now,alpha){
  const [gx,gy]=proj(ISHIGAKI.lon,ISHIGAKI.lat);
  const pulse=reduceMotion?.6:.5+.5*Math.sin(now*.0016);
  const grd=ctx.createRadialGradient(gx,gy,0,gx,gy,26+10*pulse);
  grd.addColorStop(0,`rgba(255,214,150,${.85*alpha})`);
  grd.addColorStop(.25,`rgba(240,180,110,${.35*alpha})`);
  grd.addColorStop(1,'rgba(240,180,110,0)');
  ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(gx,gy,40,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(gx,gy,2.4,0,7);
  ctx.fillStyle=`rgba(255,233,196,${alpha})`; ctx.fill();
  ctx.font=`${Math.max(9,W*.006)}px Georgia, serif`;
  ctx.fillStyle=`rgba(201,180,138,${.6*alpha})`;
  if(gx > MX+MW*.62){
    ctx.textAlign='right';
    ctx.fillText('I S H I G A K I  ·  H I R A K U B O', gx-16, gy+4);
  }else{
    ctx.textAlign='left';
    ctx.fillText('I S H I G A K I  ·  H I R A K U B O', gx+16, gy+4);
  }
  return [gx,gy];
}

function drawFlightScene(now,alpha){
  ctx.globalAlpha=alpha;
  /* 海岸線(薄い輪郭で世界地図であることを明示) */
  ctx.strokeStyle=`rgba(120,160,178,${.20*alpha})`;
  ctx.lineWidth=1;
  for(const poly of LAND){
    ctx.beginPath();
    poly.forEach((p,i)=>{
      const [x,y]=proj(p[0],p[1]);
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    });
    ctx.closePath(); ctx.stroke();
  }
  /* 呼吸する陸ドット(明るめ) */
  ctx.fillStyle='#33566a';
  for(const d of landDots){
    const a=reduceMotion?.7:.5+.3*Math.sin(now*.0006+d.ph);
    ctx.globalAlpha=a*alpha;
    ctx.fillRect(d.x-1,d.y-1,2,2);
  }
  ctx.globalAlpha=alpha;
  /* 巡礼者の星(琥珀=宿泊/銀=参加) */
  pilgrims=pilgrims.filter(p=>!p.die || now<p.die);
  for(const p of pilgrims){
    const age=(now-p.born)/1000, fade=Math.min(1,age/2);
    const tw=reduceMotion?1:.8+.2*Math.sin(now*.0012+p.x);
    const col = p.kind==='visitor' ? '178,198,216' : '232,184,109';
    ctx.beginPath(); ctx.arc(p.x,p.y,1.9,0,7);
    ctx.fillStyle=`rgba(${col},${.75*fade*tw*alpha})`; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,4.5,0,7);
    ctx.fillStyle=`rgba(${col},${.10*fade*alpha})`; ctx.fill();
  }
  const [gx,gy]=drawIshigaki(now,alpha);
  /* 波紋 */
  ripples=ripples.filter(r=>now-r.t<2200);
  for(const r of ripples){
    const k=(now-r.t)/2200;
    ctx.beginPath(); ctx.arc(gx,gy,4+k*44,0,7);
    ctx.strokeStyle=`rgba(240,190,120,${.5*(1-k)*alpha})`;
    ctx.lineWidth=1.2; ctx.stroke();
  }
  /* フライト */
  const done=[];
  for(const f of flights){
    const t=Math.min(1,(now-f.tStart)/f.dur), e=easeIO(t);
    const lon=f.lon0+(f.lonU-f.lon0)*e;
    const lat=f.lat0+(ISHIGAKI.lat-f.lat0)*e+Math.sin(Math.PI*e)*f.lift;
    const [rx,y]=proj(lon,lat), x=wrapX(rx);
    trail.push({x,y,life:1});
    const g2=ctx.createRadialGradient(x,y,0,x,y,9);
    g2.addColorStop(0,`rgba(255,244,220,${.95*alpha})`);
    g2.addColorStop(1,'rgba(255,244,220,0)');
    ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,9,0,7); ctx.fill();
    /* 出発地ラベル(彗星に随伴 / BARモードでは非表示) */
    if(!MINIMAL && t>.08 && t<.92){
      ctx.font=`${Math.max(9,W*.0058)}px Georgia, serif`;
      ctx.fillStyle=`rgba(200,214,224,${.65*alpha*Math.sin(Math.PI*t)})`;
      ctx.textAlign='left';
      ctx.fillText(f.label, x+12, y-8);
    }
    if(t>=1){
      done.push(f); ripples.push({t:now});
      if(f.no!=null){
        addPilgrimAt(f.olon,f.olat,f.kind,f.label,f.cc);
        arrivals.push({text:`PILGRIM  No.${String(f.no).padStart(4,'0')}  —  ${f.label}`, t:now});
      }else{
        /* 残響:一時的な星として灯り、静かに消える(集計には加算しない) */
        const [px,py]=proj(f.olon,f.olat);
        pilgrims.push({x:wrapX(px+(Math.random()-.5)*8), y:py+(Math.random()-.5)*8,
                       born:performance.now(), kind:f.kind,
                       die:performance.now()+90000});
      }
    }
  }
  flights=flights.filter(f=>!done.includes(f));
  /* 尾 */
  for(const p of trail){
    p.life-=reduceMotion?.04:.012;
    if(p.life>0){
      ctx.beginPath(); ctx.arc(p.x,p.y,1.2+p.life*1.2,0,7);
      ctx.fillStyle=`rgba(190,220,235,${.55*p.life*alpha})`; ctx.fill();
    }
  }
  trail=trail.filter(p=>p.life>0);
  /* 着地アナウンス(BARモードでは非表示) */
  arrivals=arrivals.filter(a2=>now-a2.t<5200);
  let ai=0;
  if(!MINIMAL) for(const a2 of arrivals){
    const k=(now-a2.t)/5200;
    const fadeA=k<.12?k/.12:(k>.8?(1-k)/.2:1);
    ctx.font=`${Math.max(10,W*.0072)}px Georgia, serif`;
    ctx.fillStyle=`rgba(232,196,130,${.85*fadeA*alpha})`;
    if(gx > MX+MW*.62){
      ctx.textAlign='right';
      ctx.fillText(a2.text, gx-16, gy+26+ai*20);
    }else{
      ctx.textAlign='left';
      ctx.fillText(a2.text, gx+16, gy+26+ai*20);
    }
    ai++;
  }
  ctx.textAlign='left';
  ctx.globalAlpha=1;
}

function drawMapScene(now,alpha,riseT){
  ctx.globalAlpha=alpha;
  /* 経緯線 */
  ctx.strokeStyle=`rgba(120,160,175,${.06*alpha})`;
  ctx.lineWidth=1;
  for(let lon=-150;lon<=180;lon+=30){
    const [x]=proj(lon,0);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let lat=-40;lat<=60;lat+=20){
    const [,y]=proj(0,lat);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  /* 塗りの大陸 */
  for(const poly of LAND){
    ctx.beginPath();
    poly.forEach((p,i)=>{
      const [x,y]=proj(p[0],p[1]);
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    });
    ctx.closePath();
    ctx.fillStyle=`rgba(22,50,62,${alpha})`;
    ctx.fill();
    ctx.strokeStyle=`rgba(130,170,185,${.3*alpha})`;
    ctx.lineWidth=1;
    ctx.stroke();
  }
  const [gx,gy]=drawIshigaki(now,alpha);
  /* 旗と平久保を結ぶ細い糸 */
  const entries=Object.entries(counts).map(([k,v])=>({origin:k, ...v}));
  for(const en of entries){
    const [px,py]=proj(en.lon,en.lat);
    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.quadraticCurveTo((px+gx)/2,(py+gy)/2-40,gx,gy);
    ctx.strokeStyle=`rgba(232,184,109,${.10*alpha})`;
    ctx.lineWidth=1;
    ctx.stroke();
  }
  /* 国旗 */
  ctx.font=`${Math.max(9,W*.0062)}px Georgia, serif`;
  entries.sort((a,b)=>a.lat-b.lat); // 北から描画
  let alt=0;
  for(const en of entries){
    const [px,py]=proj(en.lon,en.lat);
    const rise=Math.min(1,Math.max(0,(riseT-alt*.06)*2.2));
    const er=1-Math.pow(1-rise,3);
    const poleH=(26+(alt%3)*13)*er;
    const fw=Math.min(30,17+en.n*1.1), fh=fw*2/3;
    /* ポール */
    ctx.strokeStyle=`rgba(220,225,230,${.75*alpha*er})`;
    ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py-poleH); ctx.stroke();
    ctx.beginPath(); ctx.arc(px,py,2,0,7);
    ctx.fillStyle=`rgba(232,184,109,${.9*alpha*er})`; ctx.fill();
    /* 旗 */
    if(er>.15){
      ctx.save();
      ctx.globalAlpha=alpha*er;
      drawWavyFlag(getFlag(en.cc),px+1,py-poleH,fw,fh,now*.001+alt);
      ctx.restore();
      ctx.globalAlpha=alpha;
    }
    /* 地名 × 人数 */
    ctx.fillStyle=`rgba(190,205,214,${.8*alpha*er})`;
    ctx.textAlign='left';
    ctx.fillText(`${en.origin}  ×${en.n}`, px+fw+6, py-poleH+fh*.75);
    alt++;
  }
  ctx.globalAlpha=1;
}

function drawFakeQR(x,y,s,alpha){
  /* デモ用ダミーQR(本番で実QRに差し替え) */
  ctx.fillStyle=`rgba(245,246,248,${alpha})`;
  ctx.fillRect(x,y,s,s);
  const m=s/25;
  ctx.fillStyle=`rgba(20,26,32,${alpha})`;
  /* ファインダー3隅 */
  const fin=(fx,fy)=>{
    ctx.fillRect(fx,fy,m*7,m*7);
    ctx.fillStyle=`rgba(245,246,248,${alpha})`;
    ctx.fillRect(fx+m,fy+m,m*5,m*5);
    ctx.fillStyle=`rgba(20,26,32,${alpha})`;
    ctx.fillRect(fx+m*2,fy+m*2,m*3,m*3);
  };
  fin(x+m*1.5,y+m*1.5); fin(x+s-m*8.5,y+m*1.5); fin(x+m*1.5,y+s-m*8.5);
  /* 疑似モジュール(決定的パターン) */
  for(let i=0;i<15;i++)for(let j=0;j<15;j++){
    if(((i*7+j*13+i*j)%5)<2){
      ctx.fillRect(x+m*(5+i*1.0), y+m*(5+j*1.0), m*.85, m*.85);
    }
  }
}

function drawJoinScene(now,alpha){

/* ---------- MEMORIES:写真→粒子演出 ---------- */
let photos=[];   /* 各要素 = その写真の粒子配列 */
let mripples=[];

async function addPhotoFile(file){
  let bmp;
  try{ bmp=await createImageBitmap(file,{imageOrientation:'from-image'}); }
  catch(e){
    bmp=await new Promise((res,rej)=>{
      const img=new Image();
      img.onload=()=>res(img); img.onerror=rej;
      img.src=URL.createObjectURL(file);
    });
  }
  photos.push(buildPhotoParticles(bmp));
}

function buildPhotoParticles(img){
  const iw=img.width, ih=img.height, ar=iw/ih;
  const maxP=reduceMotion?4000:12000;
  let cols=Math.round(Math.sqrt(maxP*ar));
  let rows=Math.round(cols/ar);
  const oc=document.createElement('canvas');
  oc.width=cols; oc.height=rows;
  const og=oc.getContext('2d');
  og.drawImage(img,0,0,cols,rows);
  const data=og.getImageData(0,0,cols,rows).data;

  const dispW=Math.min(W*.62, H*.70*ar), dispH=dispW/ar;
  const ox=W*.40-dispW/2, oy=H*.5-dispH/2;
  const cell=dispW/cols; /* 1粒あたりのマス目 */
  const [gx,gy]=proj(ISHIGAKI.lon,ISHIGAKI.lat);

  const ps=[];
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    const i=(y*cols+x)*4;
    const r0=data[i], g0=data[i+1], b0=data[i+2];
    const L=(r0*.299+g0*.587+b0*.114)/255;
    if(L<.04)continue;
    const tx=ox+(x+.5)/cols*dispW, ty=oy+(y+.5)/rows*dispH;
    const k=Math.pow(L,.9);
    /* 写真の色を8割残し、琥珀を2割まとわせる+わずかに明るく */
    const mix=.20, lift=1.12;
    const r=Math.min(255,Math.round((r0*(1-mix)+232*mix)*lift));
    const g=Math.min(255,Math.round((g0*(1-mix)+184*mix)*lift));
    const b=Math.min(255,Math.round((b0*(1-mix)+109*mix)*lift));
    /* 出現起点=石垣の着地点(そこから花開く) */
    const a0=Math.random()*6.28, rad=Math.random()*12;
    ps.push({
      tx,ty,
      sx:gx+Math.cos(a0)*rad, sy:gy+Math.sin(a0)*rad,
      col:`${r},${g},${b}`,
      /* ハーフトーン:明るいほどマス目いっぱいに広がる粒 */
      size:cell*.46*(.30+.70*k), alpha:.55+.45*k,
      jit:Math.random()*6.28,
      delay:Math.random()*.45,
      starIdx:Math.floor(Math.random()*99991), /* 変換先の星(剰余で割当) */
      fade:Math.random()<.62,                  /* 6割は道中で光になって消える */
      cpx:(tx+gx)/2+(Math.random()-.5)*W*.15,
      cpy:(ty+gy)/2-(H*.10+Math.random()*H*.14)
    });
  }
  return ps;
}

const easeOutC=t=>1-Math.pow(1-t,3);
const easeInC=t=>t*t*t;

function drawMemoryScene(now,alpha,el,dur){
  ctx.globalAlpha=alpha;
  const [gx,gy]=proj(ISHIGAKI.lon,ISHIGAKI.lat);

  /* 平久保の灯 */
  const pulse=reduceMotion?.6:.5+.5*Math.sin(now*.0016);
  const grd=ctx.createRadialGradient(gx,gy,0,gx,gy,22+8*pulse);
  grd.addColorStop(0,`rgba(255,214,150,${.85*alpha})`);
  grd.addColorStop(.3,`rgba(240,180,110,${.32*alpha})`);
  grd.addColorStop(1,'rgba(240,180,110,0)');
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.arc(gx,gy,36,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(gx,gy,2.2,0,7);
  ctx.fillStyle=`rgba(255,233,196,${alpha})`;ctx.fill();

  /* 実データ:承認済み写真キューから1件、なければ手動追加写真でデモ再生 */
  const cyc=Math.floor(Date.now()/CYCLE);
  if(cyc!==lastMemCyc){
    lastMemCyc=cyc;
    if(memoryQueue.length){
      /* 新着は最優先で再生し、ローテーション入り */
      activeMemory=memoryQueue.shift();
      recentMemories.push(activeMemory);
      while(recentMemories.length>MEMORY_KEEP) recentMemories.shift();
    }else if(recentMemories.length){
      /* 新着がない間は直近の写真が入れ替わりで流れ続ける */
      activeMemory=recentMemories[cyc%recentMemories.length];
    }else{
      activeMemory=null;
    }
  }
  let ps=null, memOrigin='', memNo=0, memLon=0, memLat=0;
  if(activeMemory){
    ps=activeMemory.ps; memOrigin=activeMemory.origin; memNo=activeMemory.no;
    const cd=coordOf(memOrigin, activeMemory.country||'');
    memLon=cd[0]; memLat=cd[1];
  } else if(photos.length){
    ps=photos[cyc%photos.length];
    const oc2=CITIES[cityBag[(cyc*7919)%cityBag.length]];
    memOrigin=oc2[0]; memNo=(cyc*13)%900+47; memLon=oc2[1]; memLat=oc2[2];
  }
  if(!ps){
    ctx.textAlign='center';
    ctx.font=`${Math.min(W,H)*.030}px Georgia,"Hiragino Mincho ProN","Yu Mincho",serif`;
    ctx.fillStyle=`rgba(224,214,192,${.85*alpha})`;
    ctx.fillText('お客様の石垣の写真が届くと、ここに灯ります', W/2, H*.47);
    ctx.font=`italic ${Math.min(W,H)*.018}px Georgia,serif`;
    ctx.fillStyle=`rgba(140,155,166,${.75*alpha})`;
    ctx.fillText('Your photos of Ishigaki will light up here', W/2, H*.52);
    if(!USE_FEED){
      ctx.font=`${Math.min(W,H)*.016}px Georgia,"Hiragino Mincho ProN",serif`;
      ctx.fillStyle=`rgba(120,135,146,${.7*alpha})`;
      ctx.fillText('(デモ:右下の「+ 写真」から追加できます)', W/2, H*.54);
    }
    ctx.textAlign='left';
    ctx.globalAlpha=1;
    return;
  }
  const demoNo='PILGRIM  No.'+String(memNo).padStart(4,'0')+'  —  '+memOrigin;

  /* タイムライン:光が飛来 → 着地から写真が花開く → 静止 → 石垣へ吸収 → 閃光 → 一文 → 過去3人のギャラリー */
  const FL=3400, A=2400, D=4200, F=2200, M=2000;
  const GALLERY_EACH=2600; /* 過去1枚あたりの表示時間 */
  /* ギャラリー対象:activeMemory以外の直近メモリ(最大3) */
  const galleryItems=recentMemories.filter(m=>m!==activeMemory).slice(-3);
  const G=galleryItems.length*GALLERY_EACH;
  const HOLD=Math.max(1800, dur-FL-A-D-F-M-G-400);

  const numberLabel=(a2)=>{
    /* 粒子写真の下に巡礼者ナンバー(お客様が自分のものと分かる) */
    ctx.textAlign='center';
    ctx.font=`${Math.max(11,Math.min(W,H)*.024)}px Georgia, serif`;
    ctx.fillStyle=`rgba(232,196,130,${.9*a2*alpha})`;
    ctx.fillText(demoNo, W*.40, H*.88);
    ctx.textAlign='left';
  };

  if(el<FL){
    /* 出発地から光が飛来 */
    const t=Math.min(1,el/FL);
    const lon0=memLon, lat0=memLat, lonU=unwrapDest(lon0);
    const lift=Math.min(20,3+Math.hypot(lonU-lon0,ISHIGAKI.lat-lat0)*.16);
    const pos=(tt)=>{
      const ee=easeIO(tt);
      const lon=lon0+(lonU-lon0)*ee;
      const lat=lat0+(ISHIGAKI.lat-lat0)*ee+Math.sin(Math.PI*ee)*lift;
      const [rx,yy]=proj(lon,lat);
      return [wrapX(rx),yy];
    };
    for(let k2=13;k2>=0;k2--){
      const tt=t-k2*.014;
      if(tt<=0)continue;
      const [x,y]=pos(tt);
      ctx.beginPath();ctx.arc(x,y,.6+1.6*(1-k2/14),0,7);
      ctx.fillStyle=`rgba(190,220,235,${.55*(1-k2/14)*alpha})`;ctx.fill();
    }
    const [hx,hy]=pos(t);
    const g2=ctx.createRadialGradient(hx,hy,0,hx,hy,9);
    g2.addColorStop(0,`rgba(255,244,220,${.95*alpha})`);
    g2.addColorStop(1,'rgba(255,244,220,0)');
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(hx,hy,9,0,7);ctx.fill();
    if(t>.06&&t<.94){
      ctx.font=`${Math.max(9,W*.0058)}px Georgia,serif`;
      ctx.fillStyle=`rgba(200,214,224,${.65*Math.sin(Math.PI*t)*alpha})`;
      ctx.fillText(memOrigin, hx+12, hy-8);
    }
  }
  else if(el<FL+A){
    /* 着地点から6,000粒が花開き、写真になる */
    const t=(el-FL)/A;
    ctx.beginPath();ctx.arc(gx,gy,t*70,0,7);
    ctx.strokeStyle=`rgba(240,190,120,${.45*(1-t)*alpha})`;
    ctx.lineWidth=1.2;ctx.stroke();
    for(const p of ps){
      const e=easeOutC(Math.min(1,Math.max(0,t*1.3-p.delay*.3)));
      drawMP(p, p.sx+(p.tx-p.sx)*e, p.sy+(p.ty-p.sy)*e, e, .4+.6*e, alpha);
    }
    numberLabel(Math.min(1,t*2));
  }
  else if(el<FL+A+HOLD){
    for(const p of ps){
      const sh=reduceMotion?0:Math.sin(now*.002+p.jit)*.5;
      drawMP(p, p.tx+sh, p.ty+sh*.6, 1, 1, alpha);
    }
    numberLabel(1);
  }
  else if(el<FL+A+HOLD+D){
    /* 粒子が石垣へ吸い込まれていく */
    const t=(el-FL-A-HOLD)/D;
    for(const p of ps){
      let u=(t-p.delay)/(1-.45);
      if(u<=0){ drawMP(p,p.tx,p.ty,1,1,alpha); continue; }
      if(u>=1) continue;
      const e=easeInC(Math.min(1,u)), it=1-e;
      const x=it*it*p.tx + 2*it*e*p.cpx + e*e*gx;
      const y=it*it*p.ty + 2*it*e*p.cpy + e*e*gy;
      drawMP(p, x, y, 1-e*.85, 1-e*.5, alpha);
    }
    numberLabel(1-t);
  }
  else if(el<FL+A+HOLD+D+F){
    /* 石垣が光る */
    const k=(el-FL-A-HOLD-D)/F;
    const flare=Math.sin(Math.PI*Math.min(1,k*1.15));
    const fg=ctx.createRadialGradient(gx,gy,0,gx,gy,40+130*flare);
    fg.addColorStop(0,`rgba(255,228,175,${.95*flare*alpha})`);
    fg.addColorStop(.35,`rgba(240,190,120,${.35*flare*alpha})`);
    fg.addColorStop(1,'rgba(240,190,120,0)');
    ctx.fillStyle=fg;
    ctx.beginPath();ctx.arc(gx,gy,180,0,7);ctx.fill();
    for(let i=0;i<3;i++){
      const r=k*1.25-i*.18;
      if(r>0&&r<1){
        ctx.beginPath();ctx.arc(gx,gy,r*190,0,7);
        ctx.strokeStyle=`rgba(240,196,128,${.5*(1-r)*alpha})`;
        ctx.lineWidth=1.2;ctx.stroke();
      }
    }
  }
  else if(el<FL+A+HOLD+D+F+M){
    const t=Math.min(1,(el-FL-A-HOLD-D-F)/M);
    const a2=t<.25?t/.25:(t>.8?(1-t)/.2:1);
    ctx.textAlign='center';
    ctx.font=`${Math.min(W,H)*.032}px Georgia,"Hiragino Mincho ProN","Yu Mincho",serif`;
    ctx.fillStyle=`rgba(224,214,192,${.9*a2*alpha})`;
    ctx.fillText('あなたの石垣が、星座に加わりました。', W/2, H*.47);
    ctx.font=`italic ${Math.min(W,H)*.020}px Georgia,serif`;
    ctx.fillStyle=`rgba(182,166,132,${.82*a2*alpha})`;
    ctx.fillText('Your Ishigaki has joined the constellation.', W/2, H*.52);
    ctx.textAlign='left';
  }
  else if(galleryItems.length){
    /* 過去3人のギャラリー:1枚ずつ浮かんで消える */
    const gel=el-FL-A-HOLD-D-F-M;
    const idx=Math.min(galleryItems.length-1, Math.floor(gel/GALLERY_EACH));
    const local=(gel-idx*GALLERY_EACH)/GALLERY_EACH; /* 0..1 */
    const gm=galleryItems[idx];
    /* フェードイン→保持→フェードアウト */
    const fa = local<.18 ? local/.18 : (local>.78 ? (1-local)/.22 : 1);
    /* 小見出し */
    ctx.textAlign='center';
    ctx.font=`${Math.min(W,H)*.017}px Georgia,serif`;
    ctx.fillStyle=`rgba(150,165,176,${.6*fa*alpha})`;
    ctx.fillText('これまでの巡礼者たち / Fellow pilgrims', W/2, H*.13);
    /* 写真をハーフトーンで中央に静止表示(集合済みの位置=tx,ty) */
    for(const p of gm.ps){
      drawMP(p, p.tx, p.ty, fa, 1, alpha);
    }
    /* No.と出発地 */
    ctx.textAlign='center';
    ctx.font=`${Math.max(11,Math.min(W,H)*.022)}px Georgia,serif`;
    ctx.fillStyle=`rgba(232,196,130,${.85*fa*alpha})`;
    ctx.fillText('PILGRIM  No.'+String(gm.no).padStart(4,'0')+'  —  '+gm.origin, W*.40, H*.88);
    ctx.textAlign='left';
  }

  /* 波紋 */
  mripples=mripples.filter(r=>now-r.t<1800);
  for(const r of mripples){
    const k=(now-r.t)/1800;
    ctx.beginPath();ctx.arc(gx,gy,4+k*38,0,7);
    ctx.strokeStyle=`rgba(240,190,120,${.45*(1-k)*alpha})`;
    ctx.lineWidth=1.1;ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function drawMP(p,x,y,alpha,scale,sceneA){
  ctx.beginPath();
  ctx.arc(x,y,p.size*scale,0,7);
  ctx.fillStyle=`rgba(${p.col},${p.alpha*alpha*sceneA})`;
  ctx.fill();
}

function frame(now){
  ctx.clearRect(0,0,W,H);

  /* シーンを壁時計から決定 → 複数台が自動的に同期する */
  let p=Date.now()%CYCLE, name=SCENES[0][0], dur=SCENES[0][1], el=p;
  for(const s of SCENES){
    if(el<s[1]){ name=s[0]; dur=s[1]; break; }
    el-=s[1];
  }
  mode=name; curEl=el; curDur=dur;
  const a=SCENES.length===1 ? 1
        : Math.max(0, Math.min(1, el/1200, (dur-el)/1200));

  if(name==='flight') drawFlightScene(now,a);
  else if(name==='map') drawMapScene(now,a,Math.min(1,el/2500));
  else if(name==='memory') drawMemoryScene(now,a,el,dur);
  else drawJoinScene(now,a);

  requestAnimationFrame(frame);
}

/* ---------- 初期化 ---------- */
function resize(){
  DPR=Math.min(2,devicePixelRatio||1);
  W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  /* 地図を正しい縦横比で中央に収める */
  MW=Math.min(W*.96, H*.9*MAP_AR);
  MH=MW/MAP_AR;
  MX=(W-MW)/2; MY=(H-MH)/2 - H*.02;
  buildDots();
  pilgrims.forEach(p=>{}); // 位置は再投影しないが実害なし(デモ)
}
addEventListener('resize',resize);
resize();

/* ---------- 実データ取得(8秒ごとにGASをポーリング) ---------- */
let lastMemCyc=-1, activeMemory=null;
const MEMORY_KEEP=3;    /* 直近何人分の写真を回すか(1にすると常に最新の1人だけ) */
let memoryQueue=[];     /* 新着写真(最優先で1回再生) */
let recentMemories=[];  /* 直近MEMORY_KEEP人分のローテーション */
let lastNo=0, feedSeeded=false, feedFails=0;

async function pollFeed(){
  const hintEl=document.getElementById('hint');
  try{
    const res=await fetch(FEED_URL+'?after='+lastNo);
    const j=await res.json();
    feedFails=0;

    /* 旗の集計を実データで丸ごと置き換え */
    const nc={};
    for(const [origin,v] of Object.entries(j.totals||{})){
      const [lo,la]=coordOf(origin, v.country);
      nc[origin]={cc:CC_MAP[v.country]||'XX', lon:lo, lat:la, n:v.count};
    }
    counts=nc;
    if(typeof j.latest==='number' && j.latest>=total){
      total=j.latest;
      countEl.textContent=fmtCount(total);
    }

    if(!feedSeeded){
      /* 初回:過去の巡礼者を星として一括点灯し、
         承認済み写真は再生キューへ(フライトはさせない) */
      feedSeeded=true;
      for(const [,v] of Object.entries(nc)){
        const m=Math.min(v.n,6);
        for(let i=0;i<m;i++){
          const [px,py]=proj(v.lon,v.lat);
          pilgrims.push({x:wrapX(px+(Math.random()-.5)*10),
                         y:py+(Math.random()-.5)*10,
                         born:performance.now(), kind:'guest'});
        }
      }
      const withPhotos=(j.entries||[]).filter(en=>en.photo).slice(-MEMORY_KEEP);
      for(const en of withPhotos){
        const img=new Image();
        img.onload=()=>{
          recentMemories.push({no:en.no, origin:en.origin,
                               country:en.country, ps:buildPhotoParticles(img)});
          while(recentMemories.length>MEMORY_KEEP) recentMemories.shift();
        };
        img.src=en.photo;
      }
      lastNo=j.latest||0;
    }else{
      /* 新着:光を飛ばし、写真があれば再生キューへ */
      for(const en of (j.entries||[])){
        if(en.no<=lastNo) continue;
        lastNo=Math.max(lastNo,en.no);
        const [lo,la]=coordOf(en.origin, en.country);
        spawnFlightAt(lo,la, en.kind||'visitor', en.origin, en.no,
                      CC_MAP[en.country]||'XX');
        if(en.photo){
          const img=new Image();
          img.onload=()=>{
            memoryQueue.push({no:en.no, origin:en.origin,
                              country:en.country, ps:buildPhotoParticles(img)});
            while(memoryQueue.length>MEMORY_KEEP) memoryQueue.shift();
          };
          img.src=en.photo;
        }
      }
    }
  }catch(e){
    /* 通信断でも映像は止めない(プレビュー環境等では案内を表示) */
    feedFails++;
    if(feedFails>=2 && !feedSeeded){
      hintEl.textContent='通信できません — このファイルをダウンロードし、ブラウザで直接開いてください';
      hintEl.style.opacity=.9;
      hintEl.style.color='#e8b86d';
    }
  }
  setTimeout(pollFeed, 8000);
}

/* 開業以来の累積を疑似シード(2割強は参加者=銀) */
if(!USE_FEED){
  for(let i=0;i<38;i++){
    addPilgrim(cityBag[Math.floor(Math.random()*cityBag.length)],
               Math.random()<.25?'visitor':'guest');
  }
}

/* 描画ループ起動 */
requestAnimationFrame(frame);

/* 疑似フライトは ?demo=1 のときのみ / 実運用はフィード駆動 */
function loop(){
  if(mode==='flight' && (SCENES.length===1 || curDur-curEl>6000)) spawnFlight();
  setTimeout(loop, 4000+Math.random()*4000);
}

/* 残響:これまでの巡礼者の記録から、光の航跡を静かに再現し続ける */
function echoLoop(){
  if(mode==='flight' && flights.length<3){
    const keys=Object.keys(counts);
    if(keys.length){
      const bag=[];
      keys.forEach(k=>{
        const m=Math.min(counts[k].n,10);
        for(let i=0;i<m;i++) bag.push(k);
      });
      const k=bag[Math.floor(Math.random()*bag.length)];
      const v=counts[k];
      spawnFlightAt(v.lon,v.lat,'guest',k,null,v.cc);
    }
  }
  setTimeout(echoLoop, 5000+Math.random()*5000);
}

if(USE_FEED){ pollFeed(); setTimeout(echoLoop,2500); }
else { setTimeout(loop,1200); }

/* モード適用 */
if(MINIMAL) countEl.style.display='none';
document.getElementById('hint').textContent =
  `${USE_FEED?'LIVE · 実データ接続':'DEMO · 疑似データ'} · クリックで全画面 · MODE: ${MODE.toUpperCase()}`;

/* 写真追加(memoryシーンを持つモードのみ表示) */
const addBtn=document.getElementById('addPhoto');
const fileIn=document.getElementById('file');
if(!SCENES.some(s=>s[0]==='memory')) addBtn.style.display='none';
addBtn.addEventListener('click',e=>{ e.stopPropagation(); fileIn.click(); });
fileIn.addEventListener('change',async e=>{
  for(const f of e.target.files) await addPhotoFile(f);
  fileIn.value='';
});
fileIn.addEventListener('click',e=>e.stopPropagation());

/* 全画面 */
document.body.addEventListener('click',()=>{
  const el=document.documentElement;
  if(!document.fullscreenElement && el.requestFullscreen) el.requestFullscreen();
  document.getElementById('hint').style.opacity=0;
});
</script>
</body>
</html>
